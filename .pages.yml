settings:
  content:
    # Preserve existing frontmatter fields that are not configured below.
    merge: true

media:
  # Cover images used by HugoBlox throu:contentReference[oaicite:0]{index=0}
  # Repository location:
  # assets/media/news/example.jpg
  #
  # Value stored in frontmatter:
  # image:
  #   filename: news/example.jpg
  - name: news-covers
    label: News cover images
    input: assets/media/news
    output: news
    categories:
      - image
    extensions:
      - jpg
      - jpeg
      - png
      - webp
    rename: safe

  # Images inserted into the article body.
  #
  # Repository location:
  # static/uploads/news/example.jpg
  #
  # Public URL:
  # /uploads/news/example.jpg
  - name: news-body-images
    label: Images inside news articles
    input: static/uploads/news
    output: /uploads/news
    categories:
      - image
    extensions:
      - jpg
      - jpeg
      - png
      - webp
      - gif
    rename: safe

content:
  - name: news
    label: News
    type: group

    items:
      # ============================================================
      # ENGLISH NEWS
      # ============================================================
      - name: news-en
        label: English news
        type: collection
        path: content/en/post
        format: yaml-frontmatter
        subfolders: true

        # The Post URL name field is automatically slugified.
        #
        # Example input:
        # Summer Conference 2026
        #
        # Result:
        # content/en/post/summer-conference-2026/index.md
        filename:
          template: "{fields.post_id}/index.md"
          field: false

        view:
          layout: tree
          node:
            filename: index.md
            hideDirs: others

          fields:
            - title
            - date
            - draft

          primary: title

          sort:
            - date
            - title

          search:
            - title
            - summary
            - body

          default:
            sort: date
            order: desc

        operations:
          create: true

          # Prevent editors from accidentally changing published URLs.
          rename: false

          # Show the Delete post option.
          delete: true

        fields:
          # This field must remain first so editors enter it before
          # writing the rest of the post.
          - name: post_id
            label: Post URL name
            type: string
            required: true

            description: >
              Enter a short name using English letters. Pages CMS will
              automatically format it for the URL. Use exactly the same value
              when creating the Russian version. Example: Summer Conference
              2026. This value creates the post folder, so do not change it
              after publication.

            pattern:
              regex: "^[A-Za-z0-9]+(?:[ -][A-Za-z0-9]+)*$"
              message: >
                Use English letters, numbers, single spaces, and hyphens only.

            options:
              minlength: 3
              maxlength: 80

          - name: title
            label: Title
            type: string
            required: true
            options:
              maxlength: 160

          - name: subtitle
            label: Subtitle
            type: string
            required: false
            options:
              maxlength: 200

          - name: date
            label: Publication date
            type: date
            required: true
            options:
              format: yyyy-MM-dd

          - name: summary
            label: Short summary
            type: text
            required: false
            description: >
              Used in news lists, previews, and search results.

          - name: draft
            label: Draft
            type: boolean
            default: false
            description: >
              Enable this to hide the post from the published website.

          - name: image
            label: Cover image
            type: object
            required: false

            fields:
              - name: filename
                label: Cover image
                type: image
                required: false

                options:
                  media: news-covers

                  extensions:
                    - jpg
                    - jpeg
                    - png
                    - webp

                  rename: safe

              - name: caption
                label: Image caption
                type: string
                required: false

              - name: alt_text
                label: Alternative text
                type: text
                required: false
                description: >
                  Describe the image for screen readers.

              - name: focal_point
                label: Focal point
                type: select
                default: Smart

                options:
                  values:
                    - Smart
                    - Center
                    - TopLeft
                    - Top
                    - TopRight
                    - Left
                    - Right
                    - BottomLeft
                    - Bottom
                    - BottomRight

              - name: placement
                label: Image placement
                type: number
                default: 1
                description: >
                  1: full column width; 2: out-set; 3: screen width.

              - name: preview_only
                label: Show only in news previews
                type: boolean
                default: false

          - name: body
            label: Article
            type: rich-text
            required: true

            options:
              format: markdown
              media: news-body-images
              switcher: true

      # ============================================================
      # RUSSIAN NEWS
      # ============================================================
      - name: news-ru
        label: Russian news
        type: collection
        path: content/ru/post
        format: yaml-frontmatter
        subfolders: true

        # Use exactly the same Post URL name as in the English version.
        #
        # Example input:
        # Summer Conference 2026
        #
        # Result:
        # content/ru/post/summer-conference-2026/index.md
        filename:
          template: "{fields.post_id}/index.md"
          field: false

        view:
          layout: tree
          node:
            filename: index.md
            hideDirs: others

          fields:
            - title
            - date
            - draft

          primary: title

          sort:
            - date
            - title

          search:
            - title
            - summary
            - body

          default:
            sort: date
            order: desc

        operations:
          create: true

          # Prevent accidental changes to published URLs.
          rename: false

          # Show the delete option.
          delete: true

        fields:
          # Поле находится в начале формы, чтобы редактор сначала
          # указал адрес новости.
          - name: post_id
            label: URL-имя новости
            type: string
            required: true

            description: >
              Введите короткое название английскими буквами. Pages CMS
              автоматически преобразует его в формат URL. Используйте точно
              такое же значение, как в английской версии. Пример: Summer
              Conference 2026. Это значение создаёт папку новости, поэтому
              после публикации его не следует менять.

            pattern:
              regex: "^[A-Za-z0-9]+(?:[ -][A-Za-z0-9]+)*$"
              message: >
                Используйте только английские буквы, цифры, одиночные пробелы
                и дефисы.

            options:
              minlength: 3
              maxlength: 80

          - name: title
            label: Заголовок
            type: string
            required: true
            options:
              maxlength: 160

          - name: subtitle
            label: Подзаголовок
            type: string
            required: false
            options:
              maxlength: 200

          - name: date
            label: Дата публикации
            type: date
            required: true
            options:
              format: yyyy-MM-dd

          - name: summary
            label: Краткое описание
            type: text
            required: false
            description: >
              Используется в списке новостей и результатах поиска.

          - name: draft
            label: Черновик
            type: boolean
            default: false
            description: >
              Включите, чтобы скрыть материал на опубликованном сайте.

          - name: image
            label: Обложка
            type: object
            required: false

            fields:
              - name: filename
                label: Изображение обложки
                type: image
                required: false

                options:
                  media: news-covers

                  extensions:
                    - jpg
                    - jpeg
                    - png
                    - webp

                  rename: safe

              - name: caption
                label: Подпись к изображению
                type: string
                required: false

              - name: alt_text
                label: Альтернативный текст
                type: text
                required: false
                description: >
                  Опишите изображение для программ чтения с экрана.

              - name: focal_point
                label: Точка фокусировки
                type: select
                default: Smart

                options:
                  values:
                    - Smart
                    - Center
                    - TopLeft
                    - Top
                    - TopRight
                    - Left
                    - Right
                    - BottomLeft
                    - Bottom
                    - BottomRight

              - name: placement
                label: Размещение изображения
                type: number
                default: 1
                description: >
                  1: по ширине колонки; 2: с выходом за колонку;
                  3: по ширине экрана.

              - name: preview_only
                label: Показывать только в списке новостей
                type: boolean
                default: false

          - name: body
            label: Текст новости
            type: rich-text
            required: true

            options:
              format: markdown
              media: news-body-images
              switcher: true